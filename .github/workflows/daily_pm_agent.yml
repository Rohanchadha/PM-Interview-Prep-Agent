name: Daily PM Agent

on:
  schedule:
    - cron: '0 8 * * *'  # 8:00 AM UTC every day
  workflow_dispatch:       # allow manual trigger from GitHub Actions UI

jobs:
  send-daily-question:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push the updated questions_repo.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PM Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python main.py --live

      - name: Persist solved state
        run: |
          git config user.name "PM Agent Bot"
          git config user.email "actions@github.com"
          git add data/questions_repo.json
          git diff --staged --quiet || git commit -m "chore: mark question solved [skip ci]"
          git push
